<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no" />
    <meta name="theme-color" content="#1a1410" />
    <title>오비탈 마이닝</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Black+Han+Sans&display=swap" rel="stylesheet" />
    <style>
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
        background: #1a1410;
        color: #f5e9d6;
        font-family: 'Patrick Hand', 'Black Han Sans', system-ui, sans-serif;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      #app {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: radial-gradient(ellipse at center, #2a1f18 0%, #0e0a07 100%);
      }
      /* 1080x1920 가상 스테이지 — 실제 화면 비율에 맞춰 transform: scale */
      #stage {
        position: relative;
        width: 1080px;
        height: 1920px;
        transform-origin: center center;
        overflow: hidden;
        background: #0a0805;
      }
      #gl {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        display: block;
        touch-action: none;
      }
      #ui {
        position: absolute; inset: 0;
        pointer-events: none; /* 자식들이 개별로 활성 */
      }
      /* 각 자식이 자체 CSS 로 pointer-events 를 명시. 무차별 auto 규칙 제거.
         - 패널: .show 일 때만 auto (아래 .panel-bg.show)
         - 조이스틱 base/knob: 항상 none
         - #fade, HUD: 항상 none */
      #ui .passthrough { pointer-events: none; }

      /* === HUD === */
      .hud-top {
        position: absolute;
        top: 80px;
        left: 40px;
        right: 40px;
        display: flex; justify-content: space-between; align-items: center;
        pointer-events: none;
      }
      .timer {
        font-family: 'Black Han Sans', sans-serif;
        font-size: 110px;
        color: #f5e9d6;
        text-shadow: 6px 6px 0 #1a1006, 0 0 20px rgba(255,107,61,0.35);
        line-height: 1;
        letter-spacing: 2px;
      }
      .timer.warn { color: #ff6b3d; animation: pulse 0.4s infinite alternate; }
      @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }

      .ore-counter {
        background: rgba(26,16,6,0.78);
        border: 5px solid #1a1006;
        border-radius: 28px;
        padding: 18px 32px;
        display: flex; align-items: center; gap: 18px;
        box-shadow: inset 0 -6px 0 rgba(0,0,0,0.4);
      }
      .ore-counter .dot {
        width: 44px; height: 44px; border-radius: 50%;
        background: #8a857a;
        border: 4px solid #1a1006;
      }
      .ore-counter .num {
        font-family: 'Black Han Sans', sans-serif;
        font-size: 64px;
        color: #f5e9d6;
        text-shadow: 4px 4px 0 #1a1006;
        line-height: 1;
      }

      /* === Joystick === */
      .joystick-base, .joystick-knob {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        transform: translate(-50%, -50%);
        transition: opacity 0.12s;
      }
      .joystick-base {
        width: 180px; height: 180px;
        border: 8px solid rgba(245,233,214,0.55);
        background: rgba(26,16,6,0.25);
        box-shadow: 0 0 0 4px rgba(0,0,0,0.3) inset;
      }
      .joystick-knob {
        width: 80px; height: 80px;
        background: rgba(255,107,61,0.85);
        border: 6px solid #1a1006;
        box-shadow: 0 8px 0 rgba(0,0,0,0.4);
      }

      /* === Panels (Result / Shelter) === */
      .panel-bg {
        position: absolute; inset: 0;
        background: rgba(10,7,4,0.7);
        backdrop-filter: blur(4px);
        display: flex; align-items: center; justify-content: center;
        opacity: 0;
        pointer-events: none !important; /* 다른 selector 가 auto 로 덮어쓰지 못하게 */
        transition: opacity 0.25s;
      }
      .panel-bg.show { opacity: 1; pointer-events: auto !important; }

      .panel {
        width: 880px;
        background: #2a1f18;
        border: 8px solid #1a1006;
        border-radius: 40px;
        padding: 60px 50px;
        box-shadow: 0 16px 0 rgba(0,0,0,0.5), inset 0 -10px 0 rgba(0,0,0,0.3);
      }
      .panel h1 {
        font-family: 'Black Han Sans', sans-serif;
        font-size: 110px; margin: 0 0 30px 0;
        text-align: center; color: #ff6b3d;
        text-shadow: 6px 6px 0 #1a1006;
        letter-spacing: 2px;
      }
      .panel .row {
        display: flex; justify-content: space-between; align-items: center;
        background: rgba(0,0,0,0.25);
        border: 4px solid #1a1006;
        border-radius: 24px;
        padding: 22px 30px;
        margin: 14px 0;
        font-size: 50px;
      }
      .panel .row .lv { color: #4ad7d1; font-family: 'Black Han Sans', sans-serif; }
      .btn {
        display: block; width: 100%;
        background: #ff6b3d;
        border: 6px solid #1a1006;
        border-radius: 28px;
        padding: 28px 0;
        font-family: 'Black Han Sans', sans-serif;
        font-size: 70px;
        color: #f5e9d6;
        text-shadow: 4px 4px 0 #1a1006;
        margin-top: 30px;
        box-shadow: 0 10px 0 rgba(0,0,0,0.5);
        cursor: pointer;
      }
      .btn:active { transform: translateY(4px); box-shadow: 0 6px 0 rgba(0,0,0,0.5); }
      .btn.cyan { background: #4ad7d1; }
      .btn.small { font-size: 44px; padding: 18px 30px; }

      .upgrade-list { display: grid; gap: 18px; }
      .upgrade {
        display: flex; align-items: center; justify-content: space-between;
        background: rgba(0,0,0,0.25);
        border: 4px solid #1a1006;
        border-radius: 24px;
        padding: 22px 28px;
      }
      .upgrade .label { font-size: 46px; color: #f5e9d6; }
      .upgrade .lvbar { display: flex; gap: 8px; margin-top: 8px; }
      .upgrade .pip {
        width: 30px; height: 30px; border-radius: 8px;
        background: rgba(255,255,255,0.15);
        border: 3px solid #1a1006;
      }
      .upgrade .pip.on { background: #ff6b3d; }
      .upgrade button {
        background: #4ad7d1; border: 5px solid #1a1006; border-radius: 20px;
        font-family: 'Black Han Sans', sans-serif;
        font-size: 40px; color: #1a1006;
        padding: 14px 28px; min-width: 200px;
        box-shadow: 0 6px 0 rgba(0,0,0,0.4);
      }
      .upgrade button:disabled { background: #555; color: #aaa; }
      .coins {
        text-align: center; font-family: 'Black Han Sans', sans-serif;
        font-size: 70px; color: #f3c14a;
        text-shadow: 5px 5px 0 #1a1006;
        margin-bottom: 30px;
      }

      /* === Fade overlay === */
      #fade {
        position: absolute; inset: 0;
        background: #0a0805;
        opacity: 0;
        pointer-events: none !important; /* 항상 클릭 통과 */
        transition: opacity 0.35s;
      }
      #fade.on { opacity: 1; }

      /* === Loading === */
      #loading {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #1a1410; color: #f5e9d6;
        font-family: 'Black Han Sans', sans-serif;
        font-size: 80px;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CCAU_5n2.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <canvas id="gl"></canvas>
        <div id="ui">
          <!-- HUD -->
          <div class="hud-top passthrough">
            <div class="timer" id="timer">20</div>
            <div class="ore-counter">
              <div class="dot" id="oreDot"></div>
              <div class="num" id="oreNum">0</div>
            </div>
          </div>

          <!-- Joystick (생성/제거는 JS) -->
          <div class="joystick-base" id="joystickBase" style="opacity:0"></div>
          <div class="joystick-knob" id="joystickKnob" style="opacity:0"></div>

          <!-- Result Panel -->
          <div class="panel-bg" id="resultPanel">
            <div class="panel">
              <h1 id="resultTitle">결과</h1>
              <div class="row"><span id="resultOreLabel">광석</span><span class="lv" id="resultOreNum">0</span></div>
              <div class="row"><span id="resultCoinLabel">코인</span><span class="lv" id="resultCoinNum">0</span></div>
              <button class="btn" id="toShelterBtn">쉼터로</button>
            </div>
          </div>

          <!-- Shelter Panel -->
          <div class="panel-bg" id="shelterPanel">
            <div class="panel">
              <h1 id="shelterTitle">쉼터</h1>
              <div class="coins" id="shelterCoins">0 코인</div>
              <div class="upgrade-list" id="upgradeList"></div>
              <button class="btn cyan" id="toMineBtn">광산으로</button>
            </div>
          </div>

          <div id="fade"></div>
        </div>
        <div id="loading">로딩 중…</div>
      </div>
    </div>
  </body>
</html>
